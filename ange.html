
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Gestion Étudiants - Plateforme Académique</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e8f0ff 0%, #d4e0f5 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1400px;
            margin: 25px auto;
            padding: 0 25px;
            flex: 1;
        }

        .card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.15);
            padding: 32px 38px;
            transition: 0.2s;
        }

        .navbar {
            background: #0f2b3d;
            color: white;
            padding: 16px 35px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 6px 14px rgba(0,0,0,0.1);
        }
        .logo {
            font-size: 1.7rem;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .logo span {
            color: #ffb347;
        }
        .nav-links {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .nav-links a {
            color: #f0f4fc;
            text-decoration: none;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 40px;
            transition: 0.2s;
            font-size: 1rem;
        }
        .nav-links a i {
            margin-right: 8px;
        }
        .nav-links a:hover, .nav-links a.active {
            background: #ffb347;
            color: #0f2b3d;
        }
        .logout-btn {
            background: #c23b22;
            border-radius: 40px;
        }
        .logout-btn:hover {
            background: #9e2d18;
            color: white !important;
        }

        h2 {
            font-size: 1.9rem;
            margin-bottom: 22px;
            color: #0f2b3d;
            border-left: 7px solid #ffb347;
            padding-left: 18px;
        }
        h3 {
            margin: 20px 0 15px 0;
            color: #1e3a5f;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-group {
            flex: 1;
            min-width: 180px;
        }
        label {
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
            color: #1e3a5f;
        }
        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 60px;
            font-size: 0.95rem;
            transition: 0.2s;
            background: #fefefe;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #ffb347;
            box-shadow: 0 0 0 3px rgba(255, 180, 71, 0.2);
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin: 25px 0 20px;
        }
        button {
            border: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #edf2f7;
            color: #1e293b;
        }
        button i {
            font-size: 1.1rem;
        }
        .btn-primary { background: #0f2b3d; color: white; }
        .btn-primary:hover { background: #1e405a; transform: translateY(-2px); }
        .btn-success { background: #2c7a4d; color: white; }
        .btn-success:hover { background: #1f5e3a; transform: translateY(-2px); }
        .btn-danger { background: #c2412c; color: white; }
        .btn-danger:hover { background: #9f2f1c; transform: translateY(-2px); }
        .btn-warning { background: #e68a2e; color: white; }
        .btn-warning:hover { background: #cc7419; transform: translateY(-2px); }
        .btn-info { background: #2c7da0; color: white; }
        .btn-info:hover { background: #216280; transform: translateY(-2px); }

        .search-section {
            background: #f8fafd;
            padding: 20px;
            border-radius: 28px;
            margin-top: 20px;
        }
        .search-row {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        .search-row input {
            flex: 4;
            min-width: 220px;
        }
        .result-card {
            background: white;
            border-radius: 24px;
            padding: 12px 20px;
            margin-top: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .table-wrapper {
            overflow-x: auto;
            margin-top: 25px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 24px;
            overflow: hidden;
        }
        th, td {
            padding: 14px 12px;
            text-align: left;
            border-bottom: 1px solid #e9edf2;
        }
        th {
            background-color: #f1f6fd;
            color: #0f2b3d;
            font-weight: 700;
        }
        tr:hover td {
            background-color: #fef9ef;
        }
        .action-icons i {
            margin: 0 8px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.1s;
        }
        .fa-edit { color: #e68a2e; }
        .fa-trash-alt { color: #c2412c; }
        .fa-edit:hover, .fa-trash-alt:hover { transform: scale(1.15); }
        .empty-row td { text-align: center; padding: 40px; color: #5f6c80; font-style: italic; }
        .alert {
            padding: 12px 18px;
            border-radius: 50px;
            margin-bottom: 20px;
            background: #e3f7ec;
            color: #1e6f3f;
            border-left: 5px solid #2ecc71;
        }
        .alert-error {
            background: #ffe6e2;
            color: #b33a2a;
            border-left-color: #e74c3c;
        }
        .auth-card {
            max-width: 480px;
            margin: 50px auto;
        }
        footer {
            text-align: center;
            padding: 20px;
            color: #4a627a;
            font-size: 0.85rem;
        }
        .badge-promo {
            background: #eef2ff;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-block;
        }
        @media (max-width: 700px) {
            .navbar { flex-direction: column; gap: 12px; }
            .card { padding: 20px; }
            button { padding: 10px 16px; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo">🎓 Ange<span>edu</span></div>
    <div class="nav-links" id="navLinks"></div>
</nav>

<div class="container" id="appContainer"></div>

<footer>
    <i class="fas fa-database"></i> Plateforme d'inscription de gestion d'une ecole
</footer>

<script>
    // ======================= STORAGE & GLOBAL STATE =======================
    const STUDENTS_KEY = "etudiants_list_v2";

    function getEtudiants() {
        const data = localStorage.getItem(STUDENTS_KEY);
        if (data) return JSON.parse(data);
        const defaultStudents = [
            { id: "1", matricule: "ET2024001", nom: "Diop", prenom: "Aminata", filiere: "Informatique", promotion: "L3" },
            { id: "2", matricule: "ET2024002", nom: "Koné", prenom: "Mamadou", filiere: "Génie Civil", promotion: "L2" },
            { id: "3", matricule: "ET2024003", nom: "Faye", prenom: "Marième", filiere: "Mathématiques", promotion: "M1" },
            { id: "4", matricule: "ET2024004", nom: "Sow", prenom: "Ibrahima", filiere: "Informatique", promotion: "L1" }
        ];
        localStorage.setItem(STUDENTS_KEY, JSON.stringify(defaultStudents));
        return defaultStudents;
    }

    function saveEtudiants(students) {
        localStorage.setItem(STUDENTS_KEY, JSON.stringify(students));
    }

    let currentUser = localStorage.getItem("auth_user") || null;
    let currentPage = "auth";
    let editModeId = null;      // pour savoir si on modifie un étudiant existant dans formulaire

    // ======================= NAVIGATION =======================
    function renderNavbar() {
        const navDiv = document.getElementById("navLinks");
        if (!navDiv) return;
        if (currentUser) {
            navDiv.innerHTML = `
                <a href="#" data-page="home"><i class="fas fa-home"></i> Accueil</a>
                <a href="#" data-page="register"><i class="fas fa-user-plus"></i> Inscription</a>
                <a href="#" data-page="listing"><i class="fas fa-list-ul"></i> Listing</a>
                <a href="#" id="logoutNavBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Déconnexion</a>
            `;
        } else {
            navDiv.innerHTML = `<a href="#" data-page="auth"><i class="fas fa-lock"></i> Authentification</a>`;
        }
        document.querySelectorAll("[data-page]").forEach(link => {
            link.addEventListener("click", (e) => {
                e.preventDefault();
                const page = link.getAttribute("data-page");
                if (page === "auth" && currentUser) return;
                if ((page === "register" || page === "listing" || page === "home") && !currentUser) {
                    alert("Veuillez vous authentifier d'abord.");
                    navigateTo("auth");
                    return;
                }
                navigateTo(page);
            });
        });
        const logoutBtn = document.getElementById("logoutNavBtn");
        if (logoutBtn) {
            logoutBtn.addEventListener("click", (e) => {
                e.preventDefault();
                currentUser = null;
                localStorage.removeItem("auth_user");
                editModeId = null;
                navigateTo("auth");
            });
        }
    }

    function navigateTo(page) {
        currentPage = page;
        renderPage(page);
        renderNavbar();
    }

    function renderPage(page) {
        const container = document.getElementById("appContainer");
        if (!container) return;
        if (page === "auth") {
            container.innerHTML = renderAuthPage();
            attachAuthEvents();
        } else if (page === "home") {
            container.innerHTML = renderHomePage();
            attachHomeEvents();
        } else if (page === "register") {
            container.innerHTML = renderRegisterPage();
            attachRegisterEvents();
        } else if (page === "listing") {
            container.innerHTML = renderListingPage();
            attachListingEvents();
        }
    }

    // ======================= AUTHENTIFICATION =======================
    function renderAuthPage() {
        return `
            <div class="card auth-card">
                <h2><i class="fas fa-id-card"></i> Espace professeur</h2>
                <p style="margin-bottom:20px;">Connectez-vous pour accéder à la gestion des étudiants</p>
                <div id="authMessage"></div>
                <div class="form-group">
                    <label><i class="fas fa-user-graduate"></i> Identifiant</label>
                    <input type="text" id="loginUsername" placeholder="professeur" value="prof">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-key"></i> Mot de passe</label>
                    <input type="password" id="loginPassword" placeholder="••••" value="1234">
                </div>
                <button id="loginBtn" class="btn-primary"><i class="fas fa-arrow-right-to-bracket"></i> Se connecter</button>
                <p style="margin-top:18px; font-size:0.8rem; text-align:center;">🔐 Démo : prof / 1234</p>
            </div>
        `;
    }

    function attachAuthEvents() {
        const loginBtn = document.getElementById("loginBtn");
        if (loginBtn) {
            loginBtn.addEventListener("click", () => {
                const user = document.getElementById("loginUsername").value.trim();
                const pwd = document.getElementById("loginPassword").value.trim();
                if (user === "prof" && pwd === "1234") {
                    currentUser = "prof";
                    localStorage.setItem("auth_user", "prof");
                    navigateTo("home");
                } else {
                    const msgDiv = document.getElementById("authMessage");
                    msgDiv.innerHTML = "<div class='alert alert-error'><i class='fas fa-ban'></i> Identifiants incorrects (prof/1234)</div>";
                }
            });
        }
    }

    // ======================= ACCUEIL =======================
    function renderHomePage() {
        const students = getEtudiants();
        const total = students.length;
        const promoCount = {
            L1: students.filter(s => s.promotion === "L1").length,
            L2: students.filter(s => s.promotion === "L2").length,
            L3: students.filter(s => s.promotion === "L3").length,
            L4: students.filter(s => s.promotion === "L4").length,
            M1: students.filter(s => s.promotion === "M1").length,
            M2: students.filter(s => s.promotion === "M2").length
        };
        return `
            <div class="card">
                <h2><i class="fas fa-chalkboard"></i> Tableau de bord</h2>
                <div style="display: flex; gap: 20px; flex-wrap: wrap; margin: 25px 0;">
                    <div style="background: #eef3fc; padding: 22px; border-radius: 32px; flex:1; text-align:center;">
                        <i class="fas fa-users" style="font-size: 2.5rem; color:#0f2b3d;"></i>
                        <h3>${total}</h3>
                        <p>Étudiants inscrits</p>
                    </div>
                    <div style="background: #fff6ea; padding: 22px; border-radius: 32px; flex:1; text-align:center;">
                        <i class="fas fa-chart-line" style="font-size: 2.5rem; color:#e68a2e;"></i>
                        <h3>Répartition</h3>
                        <p>L1:${promoCount.L1} | L2:${promoCount.L2} | L3:${promoCount.L3}<br>L4:${promoCount.L4} | M1:${promoCount.M1} | M2:${promoCount.M2}</p>
                    </div>
                </div>
                <hr>
                <div style="margin-top: 25px; display: flex; gap: 18px; flex-wrap: wrap;">
                    <button id="homeToRegister" class="btn-success"><i class="fas fa-plus-circle"></i> Nouvelle inscription</button>
                    <button id="homeToListing" class="btn-info"><i class="fas fa-table"></i> Voir le listing complet</button>
                </div>
            </div>
        `;
    }

    function attachHomeEvents() {
        const toReg = document.getElementById("homeToRegister");
        if (toReg) toReg.addEventListener("click", () => navigateTo("register"));
        const toList = document.getElementById("homeToListing");
        if (toList) toList.addEventListener("click", () => navigateTo("listing"));
    }

    // ======================= PAGE INSCRIPTION (avec promotion L1-L4,M1,M2 et 4 boutons) =======================
    function renderRegisterPage() {
        return `
            <div class="card">
                <h2><i class="fas fa-address-card"></i> Formulaire d'inscription</h2>
                <div id="registerGlobalAlert"></div>
                <div class="form-row">
                    <div class="form-group">
                        <label>📌 Matricule <span style="color:red;">*</span></label>
                        <input type="text" id="matricule" placeholder="Ex: ET2025001">
                    </div>
                    <div class="form-group">
                        <label>👤 Nom</label>
                        <input type="text" id="nom" placeholder="Nom">
                    </div>
                    <div class="form-group">
                        <label>👥 Prénom</label>
                        <input type="text" id="prenom" placeholder="Prénom">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>📚 Filière</label>
                        <select id="filiere">
                            <option value="Informatique">Informatique</option>
                            <option value="Génie Civil">Génie Civil</option>
                            <option value="Mathématiques">Mathématiques</option>
                            <option value="Économie">Économie</option>
                            <option value="Physique">Physique</option>
                            <option value="Biologie">Biologie</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>🎓 Promotion</label>
                        <select id="promotion">
                            <option value="L1">L1 (Licence 1)</option>
                            <option value="L2">L2 (Licence 2)</option>
                            <option value="L3">L3 (Licence 3)</option>
                            <option value="L4">L4 (Licence 4)</option>
                            <option value="M1">M1 (Master 1)</option>
                            <option value="M2">M2 (Master 2)</option>
                        </select>
                    </div>
                </div>

                <div class="btn-group">
                    <button id="btnEnregistrer" class="btn-success"><i class="fas fa-save"></i> Enregistrer</button>
                    <button id="btnSupprimer" class="btn-danger"><i class="fas fa-trash-can"></i> Supprimer</button>
                    <button id="btnModifier" class="btn-warning"><i class="fas fa-pen-to-square"></i> Modifier</button>
                    <button id="btnRechercher" class="btn-info"><i class="fas fa-magnifying-glass"></i> Rechercher</button>
                </div>

                <div class="search-section">
                    <div class="search-row">
                        <input type="text" id="searchField" placeholder="🔍 Rechercher par matricule, nom ou prénom...">
                        <button id="quickSearchBtn" class="btn-info"><i class="fas fa-search"></i> Rechercher avancée</button>
                    </div>
                    <div id="searchResultsBox" style="margin-top: 10px;"></div>
                </div>
                <div id="editModeHint" style="margin-top: 10px; font-size: 0.85rem; color:#2c7da0;"></div>
            </div>
        `;
    }

    function attachRegisterEvents() {
        // Réinitialiser le mode édition à chaque chargement de la page inscription
        editModeId = null;
        const hintDiv = document.getElementById("editModeHint");
        if (hintDiv) hintDiv.innerHTML = "";

        // Éléments
        const enregBtn = document.getElementById("btnEnregistrer");
        const suppBtn = document.getElementById("btnSupprimer");
        const modifBtn = document.getElementById("btnModifier");
        const rechBtn = document.getElementById("btnRechercher");
        const quickSearch = document.getElementById("quickSearchBtn");
        const searchInput = document.getElementById("searchField");

        // Fonction utilitaire alert
        function showRegAlert(msg, isError = false) {
            const alertDiv = document.getElementById("registerGlobalAlert");
            if (alertDiv) {
                alertDiv.innerHTML = `<div class="alert ${isError ? 'alert-error' : ''}"><i class="fas ${isError ? 'fa-circle-exclamation' : 'fa-circle-check'}"></i> ${msg}</div>`;
                setTimeout(() => { if (alertDiv) alertDiv.innerHTML = ""; }, 3200);
            }
        }

        // ENREGISTRER : ajout ou modification selon editModeId
        if (enregBtn) {
            enregBtn.addEventListener("click", () => {
                const matricule = document.getElementById("matricule").value.trim();
                const nom = document.getElementById("nom").value.trim();
                const prenom = document.getElementById("prenom").value.trim();
                const filiere = document.getElementById("filiere").value;
                const promotion = document.getElementById("promotion").value;

                if (!matricule || !nom || !prenom) {
                    showRegAlert("Le matricule, le nom et le prénom sont obligatoires.", true);
                    return;
                }

                let students = getEtudiants();

                if (editModeId) {
                    // MODE MODIFICATION : on update l'étudiant existant
                    const index = students.findIndex(s => s.id === editModeId);
                    if (index !== -1) {
                        const oldMatricule = students[index].matricule;
                        // Si matricule changé, vérifier doublon avec un autre étudiant
                        if (oldMatricule !== matricule && students.some(s => s.matricule === matricule && s.id !== editModeId)) {
                            showRegAlert("Ce nouveau matricule existe déjà pour un autre étudiant.", true);
                            return;
                        }
                        students[index] = { id: editModeId, matricule, nom, prenom, filiere, promotion };
                        saveEtudiants(students);
                        showRegAlert(`✅ Étudiant ${matricule} modifié avec succès !`);
                        clearFormFields();
                        editModeId = null;
                        if (hintDiv) hintDiv.innerHTML = "";
                    } else {
                        showRegAlert("Erreur : étudiant introuvable pour modification.", true);
                    }
                } else {
                    // AJOUT NOUVEL ÉTUDIANT
                    if (students.some(s => s.matricule === matricule)) {
                        showRegAlert("Ce matricule existe déjà !", true);
                        return;
                    }
                    const newId = Date.now().toString();
                    const newStudent = { id: newId, matricule, nom, prenom, filiere, promotion };
                    students.push(newStudent);
                    saveEtudiants(students);
                    showRegAlert(`🎉 Étudiant ${matricule} enregistré avec succès !`);
                    clearFormFields();
                }
                document.getElementById("searchResultsBox").innerHTML = "";
            });
        }

        // SUPPRIMER : supprime l'étudiant selon le matricule saisi dans le champ
        if (suppBtn) {
            suppBtn.addEventListener("click", () => {
                const matricule = document.getElementById("matricule").value.trim();
                if (!matricule) {
                    showRegAlert("Veuillez saisir le matricule de l'étudiant à supprimer.", true);
                    return;
                }
                let students = getEtudiants();
                const existing = students.find(s => s.matricule === matricule);
                if (!existing) {
                    showRegAlert(`Aucun étudiant avec le matricule "${matricule}" trouvé.`, true);
                    return;
                }
                if (confirm(`Supprimer définitivement ${existing.nom} ${existing.prenom} (${matricule}) ?`)) {
                    const newList = students.filter(s => s.matricule !== matricule);
                    saveEtudiants(newList);
                    showRegAlert(`🗑️ Étudiant ${matricule} supprimé.`);
                    clearFormFields();
                    editModeId = null;
                    if (hintDiv) hintDiv.innerHTML = "";
                    document.getElementById("searchResultsBox").innerHTML = "";
                }
            });
        }

        // MODIFIER : pré-remplit le formulaire avec les données de l'étudiant dont le matricule est saisi
        if (modifBtn) {
            modifBtn.addEventListener("click", () => {
                const matricule = document.getElementById("matricule").value.trim();
                if (!matricule) {
                    showRegAlert("Entrez le matricule de l'étudiant à modifier.", true);
                    return;
                }
                const students = getEtudiants();
                const found = students.find(s => s.matricule === matricule);
                if (!found) {
                    showRegAlert(`Étudiant avec matricule "${matricule}" non trouvé.`, true);
                    return;
                }
                // Pré-remplissage
                document.getElementById("nom").value = found.nom;
                document.getElementById("prenom").value = found.prenom;
                document.getElementById("filiere").value = found.filiere;
                document.getElementById("promotion").value = found.promotion;
                editModeId = found.id;
                if (hintDiv) hintDiv.innerHTML = `<i class="fas fa-pen"></i> ✏️ Mode édition actif : modification de ${found.matricule} (${found.nom} ${found.prenom}). Cliquez sur "Enregistrer".`;
                showRegAlert(`Modification de ${found.matricule} activée. Ajustez les champs et validez.`);
                // Optionnel : afficher résultat dans zone recherche
                const resBox = document.getElementById("searchResultsBox");
                if (resBox) resBox.innerHTML = `<div class="result-card"><i class="fas fa-user-edit"></i> Édition en cours : ${found.matricule} - ${found.nom} ${found.prenom} (${found.promotion})</div>`;
            });
        }

        // RECHERCHER : affiche les résultats dans la zone dédiée (bouton Rechercher classique)
        if (rechBtn) {
            rechBtn.addEventListener("click", () => {
                const query = document.getElementById("matricule").value.trim() || document.getElementById("nom").value.trim();
                performSearch(query);
            });
        }

        // Recherche avancée (champ dédié)
        if (quickSearch) {
            quickSearch.addEventListener("click", () => {
                const query = searchInput ? searchInput.value.trim() : "";
                performSearch(query);
            });
        }
        if (searchInput) {
            searchInput.addEventListener("keypress", (e) => {
                if (e.key === "Enter") performSearch(searchInput.value.trim());
            });
        }

        function performSearch(query) {
            const resBox = document.getElementById("searchResultsBox");
            if (!query) {
                resBox.innerHTML = "<div class='result-card' style='color:#7f8c8d;'>🔎 Saisissez un matricule, nom ou prénom pour rechercher.</div>";
                return;
            }
            const students = getEtudiants();
            const lowerQuery = query.toLowerCase();
            const results = students.filter(s =>
                s.matricule.toLowerCase().includes(lowerQuery) ||
                s.nom.toLowerCase().includes(lowerQuery) ||
                s.prenom.toLowerCase().includes(lowerQuery)
            );
            if (results.length === 0) {
                resBox.innerHTML = "<div class='alert alert-error'><i class='fas fa-exclamation-triangle'></i> Aucun étudiant correspondant.</div>";
                return;
            }
            let html = `<div style="font-weight:700; margin-bottom:12px;">📋 ${results.length} résultat(s) trouvé(s) :</div>`;
            results.forEach(et => {
                html += `<div class="result-card" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
                            <div><strong>${et.matricule}</strong> - ${et.nom} ${et.prenom} | ${et.filiere} | <span class="badge-promo">${et.promotion}</span></div>
                            <div>
                                <i class="fas fa-edit edit-from-search" data-id="${et.id}" data-mat="${et.matricule}" data-nom="${et.nom}" data-prenom="${et.prenom}" data-filiere="${et.filiere}" data-promo="${et.promotion}" style="color:#e68a2e; margin:0 5px; cursor:pointer;"></i>
                                <i class="fas fa-trash-alt delete-from-search" data-id="${et.id}" data-mat="${et.matricule}" style="color:#c2412c; cursor:pointer;"></i>
                            </div>
                         </div>`;
            });
            resBox.innerHTML = html;

            // Événements pour les icônes de résultat (modifier/supprimer rapides)
            document.querySelectorAll(".edit-from-search").forEach(icon => {
                icon.addEventListener("click", (e) => {
                    const id = icon.getAttribute("data-id");
                    const mat = icon.getAttribute("data-mat");
                    const nom = icon.getAttribute("data-nom");
                    const prenom = icon.getAttribute("data-prenom");
                    const filiere = icon.getAttribute("data-filiere");
                    const promo = icon.getAttribute("data-promo");
                    document.getElementById("matricule").value = mat;
                    document.getElementById("nom").value = nom;
                    document.getElementById("prenom").value = prenom;
                    document.getElementById("filiere").value = filiere;
                    document.getElementById("promotion").value = promo;
                    editModeId = id;
                    if (hintDiv) hintDiv.innerHTML = `<i class="fas fa-pen"></i> ✏️ Mode édition : modification de ${mat} (cliquez sur Enregistrer)`;
                    showRegAlert(`Édition activée pour ${mat}. Modifiez et validez.`);
                });
            });
            document.querySelectorAll(".delete-from-search").forEach(icon => {
                icon.addEventListener("click", (e) => {
                    const id = icon.getAttribute("data-id");
                    const mat = icon.getAttribute("data-mat");
                    if (confirm(`Supprimer l'étudiant ${mat} ?`)) {
                        let students = getEtudiants();
                        const newList = students.filter(s => s.id !== id);
                        saveEtudiants(newList);
                        showRegAlert(`Étudiant ${mat} supprimé.`);
                        performSearch(searchInput ? searchInput.value.trim() : "");
                        if (document.getElementById("matricule").value === mat) clearFormFields();
                        if (editModeId === id) { editModeId = null; if(hintDiv) hintDiv.innerHTML = ""; }
                    }
                });
            });
        }

        function clearFormFields() {
            document.getElementById("matricule").value = "";
            document.getElementById("nom").value = "";
            document.getElementById("prenom").value = "";
            document.getElementById("filiere").value = "Informatique";
            document.getElementById("promotion").value = "L1";
            editModeId = null;
            if (hintDiv) hintDiv.innerHTML = "";
        }
    }

    // ======================= PAGE LISTING (avec boutons supprimer/modifier directs) =======================
    function renderListingPage() {
        const students = getEtudiants();
        if (students.length === 0) {
            return `<div class="card"><h2><i class="fas fa-table-list"></i> Liste des étudiants</h2><p>Aucun étudiant inscrit.</p><button id="emptyGoReg" class="btn-primary">Inscrire un étudiant</button></div>`;
        }
        let rows = "";
        students.forEach(et => {
            rows += `<tr>
                        <td>${escapeHtml(et.matricule)}</td>
                        <td>${escapeHtml(et.nom)}</td>
                        <td>${escapeHtml(et.prenom)}</td>
                        <td>${escapeHtml(et.filiere)}</td>
                        <td><span class="badge-promo">${escapeHtml(et.promotion)}</span></td>
                        <td class="action-icons">
                            <i class="fas fa-edit edit-listing" data-id="${et.id}" data-mat="${escapeHtml(et.matricule)}" data-nom="${escapeHtml(et.nom)}" data-prenom="${escapeHtml(et.prenom)}" data-filiere="${escapeHtml(et.filiere)}" data-promo="${escapeHtml(et.promotion)}"></i>
                            <i class="fas fa-trash-alt delete-listing" data-id="${et.id}" data-mat="${escapeHtml(et.matricule)}"></i>
                        </td>
                     </tr>`;
        });
        return `
            <div class="card">
                <h2><i class="fas fa-users-viewfinder"></i> Listing complet des étudiants</h2>
                <div class="table-wrapper">
                    <table>
                        <thead><tr><th>Matricule</th><th>Nom</th><th>Prénom</th><th>Filière</th><th>Promotion</th><th>Actions</th></tr></thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>
                <div style="margin-top: 25px; display: flex; gap: 15px;">
                    <button id="refreshListing" class="btn-info"><i class="fas fa-rotate-right"></i> Rafraîchir</button>
                    <button id="goToInscription" class="btn-success"><i class="fas fa-plus"></i> Ajouter étudiant</button>
                </div>
            </div>
        `;
    }

    function attachListingEvents() {
        // Suppression depuis listing
        document.querySelectorAll(".delete-listing").forEach(icon => {
            icon.addEventListener("click", () => {
                const id = icon.getAttribute("data-id");
                const mat = icon.getAttribute("data-mat");
                if (confirm(`Supprimer l'étudiant ${mat} ?`)) {
                    let students = getEtudiants();
                    const newList = students.filter(s => s.id !== id);
                    saveEtudiants(newList);
                    renderPage("listing");
                    renderNavbar();
                }
            });
        });

        // Modification depuis listing -> aller vers page inscription avec préremplissage
        document.querySelectorAll(".edit-listing").forEach(icon => {
            icon.addEventListener("click", () => {
                const id = icon.getAttribute("data-id");
                const matricule = icon.getAttribute("data-mat");
                const nom = icon.getAttribute("data-nom");
                const prenom = icon.getAttribute("data-prenom");
                const filiere = icon.getAttribute("data-filiere");
                const promo = icon.getAttribute("data-promo");
                // Stocker temporairement pour pré-remplir
                sessionStorage.setItem("prefillStudent", JSON.stringify({ id, matricule, nom, prenom, filiere, promotion: promo }));
                navigateTo("register");
                setTimeout(() => {
                    const dataRaw = sessionStorage.getItem("prefillStudent");
                    if (dataRaw && document.getElementById("matricule")) {
                        const data = JSON.parse(dataRaw);
                        document.getElementById("matricule").value = data.matricule;
                        document.getElementById("nom").value = data.nom;
                        document.getElementById("prenom").value = data.prenom;
                        document.getElementById("filiere").value = data.filiere;
                        document.getElementById("promotion").value = data.promotion;
                        editModeId = data.id;
                        const hintDiv = document.getElementById("editModeHint");
                        if (hintDiv) hintDiv.innerHTML = `<i class="fas fa-pen"></i> ✏️ Mode édition : modification de ${data.matricule} (cliquez sur Enregistrer)`;
                        sessionStorage.removeItem("prefillStudent");
                    }
                }, 60);
            });
        });

        const refreshBtn = document.getElementById("refreshListing");
        if (refreshBtn) refreshBtn.addEventListener("click", () => renderPage("listing"));
        const goInscr = document.getElementById("goToInscription");
        if (goInscr) goInscr.addEventListener("click", () => navigateTo("register"));
        const emptyBtn = document.getElementById("emptyGoReg");
        if (emptyBtn) emptyBtn.addEventListener("click", () => navigateTo("register"));
    }

    function escapeHtml(str) { if(!str) return ""; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    function init() { currentUser ? navigateTo("home") : navigateTo("auth"); }
    init();
</script>
</body>
</html>
